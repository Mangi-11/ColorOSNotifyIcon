name: Formal Release Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Production-Signed APK
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Verify release source
        shell: bash
        run: test "$GITHUB_REF" = "refs/heads/master"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: 21
          java-package: jdk
          distribution: temurin
          cache: gradle

      - name: Test, lint and build unsigned release
        env:
          COLOROS_NOTIFY_FORMAL_RELEASE: 'true'
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:lintRelease :app:assembleRelease

      - name: Sign and verify formal release
        shell: bash
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"
          umask 077
          keystore_path="${RUNNER_TEMP}/release.p12"
          trap 'rm -f "$keystore_path"' EXIT
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          unset RELEASE_KEYSTORE_BASE64
          test -s "$keystore_path"
          expected_fingerprint=$(sed -nE \
            's/^project\.app\.signing\.productionCertificateSha256=([0-9a-fA-F]{64})$/\1/p' \
            gradle.properties)
          actual_fingerprint=$(
            keytool -exportcert \
              -alias "$RELEASE_KEY_ALIAS" \
              -keystore "$keystore_path" \
              -storetype PKCS12 \
              -storepass:env RELEASE_STORE_PASSWORD \
            | openssl x509 -inform DER -outform DER \
            | openssl dgst -sha256 -r \
            | cut -d' ' -f1
          )
          test -n "$expected_fingerprint"
          test "${actual_fingerprint,,}" = "${expected_fingerprint,,}"
          android_sdk="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          test -n "$android_sdk"
          build_tools=$(find "$android_sdk/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)
          unsigned_source=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*-unsigned.apk' -print -quit)
          version_name=$(sed -nE 's/^project\.app\.versionName="?([^"[:space:]]+)"?$/\1/p' gradle.properties)
          test -n "$version_name"
          test -n "$build_tools"
          test -n "$unsigned_source"
          "$build_tools/zipalign" -c -P 16 4 "$unsigned_source"
          release_target="${RUNNER_TEMP}/ColorOSNotifyIcon-${version_name}-release.apk"
          "$build_tools/apksigner" sign \
            --ks "$keystore_path" \
            --ks-type PKCS12 \
            --ks-key-alias "$RELEASE_KEY_ALIAS" \
            --ks-pass env:RELEASE_STORE_PASSWORD \
            --key-pass env:RELEASE_KEY_PASSWORD \
            --out "$release_target" \
            "$unsigned_source"
          unset RELEASE_STORE_PASSWORD RELEASE_KEY_PASSWORD RELEASE_KEY_ALIAS
          "$build_tools/apksigner" verify --verbose --print-certs "$release_target"
          echo "RELEASE_APK_PATH=$release_target" >> "$GITHUB_ENV"

      - name: Upload production-signed artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          path: ${{ env.RELEASE_APK_PATH }}
          name: ColorOSNotifyIcon-release-${{ github.sha }}
          if-no-files-found: error

      - name: Upload Release Mapping
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          path: app/build/outputs/mapping/release/mapping.txt
          name: ColorOSNotifyIcon-release-mapping-${{ github.sha }}
          if-no-files-found: error
