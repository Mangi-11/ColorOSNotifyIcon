name: Automatic Build on Commit

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '**.txt'

permissions:
  contents: read

jobs:
  build:
    name: Build CI
    runs-on: ubuntu-latest
    env:
      APK_OUTPUT_PATH: 'app/build/outputs/apk'
      COMMIT_MESSAGE: |+
        New push to GitHub!

        ${{ github.event.head_commit.message }}

        by ${{ github.event.head_commit.author.name }}
        ${{ github.event.head_commit.url }}
      COMMIT_URL: ${{ github.event.head_commit.url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: 21
          java-package: jdk
          distribution: 'temurin'
          cache: 'gradle'

      - name: Test, lint and build
        run: |
          ./gradlew :app:testDebugUnitTest :app:lintRelease :app:assembleDebug :app:assembleRelease

      - name: Name snapshot artifacts
        shell: bash
        run: |
          set -euo pipefail
          version_name=$(sed -nE 's/^project\.app\.versionName="?([^"[:space:]]+)"?$/\1/p' gradle.properties)
          short_sha=${GITHUB_SHA:0:7}
          debug_source=$(find "${APK_OUTPUT_PATH}/debug" -maxdepth 1 -type f -name '*.apk' -print -quit)
          snapshot_source=$(find "${APK_OUTPUT_PATH}/release" -maxdepth 1 -type f -name '*.apk' -print -quit)
          test -n "$version_name"
          test -n "$debug_source"
          test -n "$snapshot_source"
          debug_target="${RUNNER_TEMP}/ColorOSNotifyIcon-${version_name}-debug-${short_sha}.apk"
          snapshot_target="${RUNNER_TEMP}/ColorOSNotifyIcon-${version_name}-snapshot-${short_sha}.apk"
          install -m 0644 "$debug_source" "$debug_target"
          install -m 0644 "$snapshot_source" "$snapshot_target"
          echo "DEBUG_APK_PATH=$debug_target" >> "$GITHUB_ENV"
          echo "SNAPSHOT_APK_PATH=$snapshot_target" >> "$GITHUB_ENV"

      - name: Upload Artifacts (Debug)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          path: ${{ env.DEBUG_APK_PATH }}
          name: ColorOSNotifyIcon-debug-${{ github.sha }}
          if-no-files-found: error

      - name: Upload Artifacts (Snapshot)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          path: ${{ env.SNAPSHOT_APK_PATH }}
          name: ColorOSNotifyIcon-snapshot-${{ github.sha }}
          if-no-files-found: error

      - name: Upload Snapshot Mapping
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          path: app/build/outputs/mapping/release/mapping.txt
          name: ColorOSNotifyIcon-snapshot-mapping-${{ github.sha }}
          if-no-files-found: error

      - name: Post Artifacts to Telegram
        shell: bash
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${TG_BOT_TOKEN}" || -z "${TG_CHAT_ID}" ]]; then
            exit 0
          fi
          media=$(env -u TG_BOT_TOKEN -u TG_CHAT_ID python3 - <<'PY'
          import json
          import os

          message = os.environ["COMMIT_MESSAGE"]
          if len(message) > 1024:
              message = os.environ["COMMIT_URL"]
          print(json.dumps([
              {"type": "document", "media": "attach://debug"},
              {"type": "document", "media": "attach://snapshot", "caption": message},
          ]))
          PY
          )
          curl --fail-with-body --silent --show-error \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMediaGroup" \
            --form-string "chat_id=${TG_CHAT_ID}" \
            --form-string "media=${media}" \
            --form "debug=@${DEBUG_APK_PATH}" \
            --form "snapshot=@${SNAPSHOT_APK_PATH}"
